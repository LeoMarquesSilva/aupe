# Supabase local config (usado também como referência para deploy)
# https://supabase.com/docs/guides/cli/config

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true

# Edge Functions públicas (token/webhook) não exigem JWT
[functions.get-client-dashboard-by-token-]
verify_jwt = false

[functions.get-approval-request-by-token]
verify_jwt = false

[functions.submit-approval-response]
verify_jwt = false

[functions.upload-approval-feedback-attachment]
verify_jwt = false

[functions.get-internal-approval-by-token]
verify_jwt = false

[functions.submit-internal-approval-response]
verify_jwt = false

[functions.stripe-webhook]
verify_jwt = false

# JWT desabilitado no gateway; a validação do code Instagram (single-use) + apikey é suficiente.
# O JWT é verificado opcionalmente dentro da função para logging.
[functions.instagram-oauth-exchange]
verify_jwt = false

[functions.instagram-refresh-tokens]
verify_jwt = false
